      RECORD-009: Transaction ID TXN-29579 | Status: COMPLETED | Amount: $331.50 | Timestamp: 2024-01-15T09:31:39Z | Category: WHOLESALE | Region: APAC | Validation: PASSED
      RECORD-010: Transaction ID TXN-29580 | Status: COMPLETED | Amount: $47.25 | Timestamp: 2024-01-15T09:32:50Z | Category: RETAIL | Region: US-EAST | Validation: PASSED
